body:
  text: 二月八日四月八日五月八日七月十五日年三長齊月正月五月九月六齊日八日十四日十五日二十三日二十八日三十日十齊日月一日善惡憍童子下念十四日察命伺録下十五日五道大神下十八日閻羅王下二十三日天大將軍下二十四日帝釋下二十八日太山府軍下二十九日四天王下三十日天曹地府下一日童子下念定光如來佛除齊除罪四十劫不墮刀槍地獄八日太子下念藥師琉璃光佛除齊除罪三十劫不墮粉草地獄十四日察命下念賢劫千佛除齊除罪一千劫不墮鑊湯地獄十五日五道大將軍下念阿彌陀佛除齊除罪二百劫不墮寒氷地獄十八日閻羅王下念觀世音菩薩除齊除罪九十劫不墮劍樹地獄二十三日天大將軍下念盧舍那佛除齊除罪一千劫不墮餓鬼地獄二十四日太山府君下念地藏菩薩除齊除罪九十劫不墮才截地獄二十八日天帝釋下念阿彌陀佛除齊除罪一千劫不墮鐵鋸地獄二十九日四天王下念藥王藥上菩薩除齊除罪七千劫不墮磑磨地獄三十日大梵天王下念釋迦牟尼佛除齊除罪八千劫不墮寒氷
